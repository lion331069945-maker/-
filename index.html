<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>永鼎股份 600105 实时量化看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111417;
      --panel: #181d22;
      --panel-2: #20262d;
      --text: #eef3f2;
      --muted: #93a09c;
      --line: #2c343b;
      --red: #f05a5a;
      --green: #35c888;
      --amber: #f3c969;
      --blue: #67a7ff;
      --white-soft: rgba(255,255,255,.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0 20px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.05;
      font-weight: 800;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill, .btn, .input-wrap {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 42px;
      border-radius: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--amber);
      box-shadow: 0 0 0 5px rgba(243,201,105,.12);
    }

    .dot.live {
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(53,200,136,.12);
    }

    .btn {
      display: inline-grid;
      place-items: center;
      width: 42px;
      cursor: pointer;
      transition: border-color .18s, background .18s, transform .18s;
    }

    .btn:hover {
      border-color: #4b5964;
      background: #222a31;
      transform: translateY(-1px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.65fr) minmax(340px, .85fr);
      gap: 16px;
      align-items: start;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }

    .metric {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .value {
      font-size: clamp(22px, 2vw, 31px);
      line-height: 1;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .up { color: var(--red); }
    .down { color: var(--green); }
    .neutral { color: var(--amber); }

    .chart-panel {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 99px;
      background: var(--blue);
    }

    .swatch.avg { background: var(--amber); }
    .swatch.ema { background: var(--green); }

    .chart-wrap {
      position: relative;
      flex: 1;
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #12171b;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .watermark {
      position: absolute;
      inset: auto 18px 16px auto;
      color: rgba(255,255,255,.18);
      font-weight: 800;
      pointer-events: none;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .signal {
      display: grid;
      gap: 14px;
    }

    .signal-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-radius: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .signal-word {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
    }

    .score {
      width: 72px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--panel-2) 58%, transparent 59%),
        conic-gradient(var(--amber) calc(var(--score, 0) * 1%), rgba(255,255,255,.08) 0);
      font-weight: 900;
    }

    .checks {
      display: grid;
      gap: 8px;
    }

    .check {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .check strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .check em {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-style: normal;
      margin-top: 2px;
    }

    .check-score {
      min-width: 52px;
      text-align: right;
      font-weight: 800;
    }

    .mark {
      width: 18px;
      height: 18px;
      border-radius: 99px;
      display: grid;
      place-items: center;
      color: #08110d;
      background: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .mark.ok { background: var(--green); }
    .mark.bad { background: var(--red); color: white; }
    .mark.warn { background: var(--amber); }

    .params {
      display: grid;
      gap: 14px;
    }

    .param {
      display: grid;
      grid-template-columns: 1fr 68px;
      gap: 12px;
      align-items: center;
    }

    .param select {
      grid-column: 1 / -1;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 10px;
      outline: 0;
      font-weight: 800;
    }

    .param select option {
      color: #111417;
      background: #ffffff;
    }

    .param input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .param-value {
      text-align: right;
      color: var(--text);
      font-weight: 800;
    }

    .log {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .input-wrap {
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    .input-wrap select {
      min-width: 184px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    .input-wrap option {
      color: #111417;
      background: #ffffff;
    }

    .input-wrap input {
      width: 78px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-weight: 800;
    }

    @media (max-width: 1020px) {
      .layout { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .app { padding: 14px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .metrics { grid-template-columns: 1fr; }
      .chart-panel { min-height: 440px; }
      .chart-wrap { min-height: 330px; }
      .panel-head { align-items: flex-start; flex-direction: column; }
      .param { grid-template-columns: 1fr 54px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1 id="stockName">永鼎股份</h1>
        <div id="stockSub" class="sub">A 股多股票实时量化看板 · 股票池 3 只 · 600105.SH · v6</div>
      </div>
      <div class="toolbar">
        <div class="input-wrap" title="选择要监控的 A 股">
          <span class="small">股票</span>
          <select id="stockSelect" aria-label="选择股票">
            <option value="600105">永鼎股份 · 600105.SH</option>
            <option value="603629">利通电子 · 603629.SH</option>
            <option value="000988">华工科技 · 000988.SZ</option>
          </select>
        </div>
        <div class="pill"><span id="liveDot" class="dot"></span><span id="marketStatus">连接中</span></div>
        <button class="btn" id="refreshBtn" title="立即刷新" aria-label="立即刷新">
          <svg viewBox="0 0 24 24"><path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 5v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4"/></svg>
        </button>
      </div>
    </header>

    <section class="metrics">
      <article class="card metric">
        <div class="label">最新价</div>
        <div id="price" class="value">--</div>
        <div id="time" class="small">等待行情</div>
      </article>
      <article class="card metric">
        <div class="label">涨跌幅</div>
        <div id="changePct" class="value">--</div>
        <div id="change" class="small">--</div>
      </article>
      <article class="card metric">
        <div class="label">成交量</div>
        <div id="volume" class="value">--</div>
        <div id="turnover" class="small">成交额 --</div>
      </article>
      <article class="card metric">
        <div class="label">日内区间</div>
        <div id="range" class="value">--</div>
        <div id="openPrev" class="small">开盘 -- · 昨收 --</div>
      </article>
    </section>

    <section class="layout">
      <article class="card chart-panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">实时分时曲线</div>
            <div id="chartHint" class="small">每 5 秒尝试刷新一次，浏览器保持打开即可持续监控。</div>
          </div>
          <div class="legend">
            <span><i class="swatch"></i>价格</span>
            <span><i class="swatch avg"></i>动态均价</span>
            <span><i class="swatch ema"></i>EMA 趋势</span>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart" width="1200" height="520"></canvas>
          <div id="watermark" class="watermark">600105</div>
        </div>
      </article>

      <aside class="side">
        <article class="card signal">
          <div class="panel-head">
            <div class="panel-title">买入信号</div>
            <div id="signalTime" class="small">--</div>
          </div>
          <div class="signal-main">
            <div>
              <div id="signalWord" class="signal-word neutral">观望</div>
              <div id="signalReason" class="small">等待足够的分时数据。</div>
            </div>
            <div id="score" class="score" style="--score:0">0</div>
          </div>
          <div class="checks" id="checks"></div>
        </article>

        <article class="card params">
          <div class="panel-title">策略参数</div>
          <label class="param">
            <span class="small">策略模式</span>
            <select id="pStrategyMode" aria-label="策略模式">
              <option value="balanced">综合多因子</option>
              <option value="strictTrend">AI 严进趋势</option>
              <option value="volumeBreakout">放量突破</option>
              <option value="pullback">缩量回踩</option>
              <option value="maAlignment">多头排列</option>
            </select>
          </label>
          <label class="param">
            <span class="small">均价突破阈值</span>
            <input id="pBreakout" type="range" min="0.1" max="2" value="0.30" step="0.05">
            <span id="pBreakoutVal" class="param-value">0.30%</span>
          </label>
          <label class="param">
            <span class="small">最小涨幅过滤</span>
            <input id="pMinRise" type="range" min="-2" max="4" value="0.2" step="0.1">
            <span id="pMinRiseVal" class="param-value">0.2%</span>
          </label>
          <label class="param">
            <span class="small">放量倍数</span>
            <input id="pVolume" type="range" min="1" max="4" value="1.4" step="0.1">
            <span id="pVolumeVal" class="param-value">1.4x</span>
          </label>
          <label class="param">
            <span class="small">RSI 上限</span>
            <input id="pRsiMax" type="range" min="58" max="86" value="76" step="1">
            <span id="pRsiMaxVal" class="param-value">76</span>
          </label>
          <label class="param">
            <span class="small">最大回撤</span>
            <input id="pDrawdown" type="range" min="1" max="7" value="3.5" step="0.5">
            <span id="pDrawdownVal" class="param-value">3.5%</span>
          </label>
          <label class="param">
            <span class="small">最大追高限制</span>
            <input id="pChase" type="range" min="2" max="9" value="6" step="0.5">
            <span id="pChaseVal" class="param-value">6%</span>
          </label>
        </article>

        <article class="card">
          <div class="panel-head">
            <div class="panel-title">监控日志</div>
            <div id="source" class="small">行情源 --</div>
          </div>
          <div id="log" class="log" aria-live="polite"></div>
        </article>
      </aside>
    </section>
  </main>

  <script>
    const STOCKS = {
      "600105": { code: "600105", symbol: "sh600105", name: "永鼎股份", market: "SH" },
      "603629": { code: "603629", symbol: "sh603629", name: "利通电子", market: "SH" },
      "000988": { code: "000988", symbol: "sz000988", name: "华工科技", market: "SZ" }
    };
    const REFRESH_MS = 5000;
    const MAX_POINTS = 260;
    const state = {
      currentStock: STOCKS["600105"],
      ticks: [],
      lastVolume: null,
      lastFetchAt: null,
      quote: null,
      fetchTimer: null,
      source: "--",
      errors: 0,
      requestId: 0
    };

    const $ = (id) => document.getElementById(id);
    const els = {
      liveDot: $("liveDot"),
      stockName: $("stockName"),
      stockSub: $("stockSub"),
      stockSelect: $("stockSelect"),
      watermark: $("watermark"),
      marketStatus: $("marketStatus"),
      price: $("price"),
      time: $("time"),
      changePct: $("changePct"),
      change: $("change"),
      volume: $("volume"),
      turnover: $("turnover"),
      range: $("range"),
      openPrev: $("openPrev"),
      signalTime: $("signalTime"),
      signalWord: $("signalWord"),
      signalReason: $("signalReason"),
      score: $("score"),
      checks: $("checks"),
      log: $("log"),
      source: $("source"),
      chartHint: $("chartHint")
    };

    const params = {
      strategyMode: $("pStrategyMode"),
      breakout: $("pBreakout"),
      minRise: $("pMinRise"),
      volume: $("pVolume"),
      rsiMax: $("pRsiMax"),
      drawdown: $("pDrawdown"),
      chase: $("pChase")
    };

    const fmt = {
      price: (n) => Number.isFinite(n) ? n.toFixed(2) : "--",
      pct: (n) => Number.isFinite(n) ? `${n >= 0 ? "+" : ""}${n.toFixed(2)}%` : "--",
      num: (n) => Number.isFinite(n) ? n.toLocaleString("zh-CN") : "--",
      money: (n) => {
        if (!Number.isFinite(n)) return "--";
        if (Math.abs(n) >= 1e8) return `${(n / 1e8).toFixed(2)} 亿`;
        if (Math.abs(n) >= 1e4) return `${(n / 1e4).toFixed(2)} 万`;
        return n.toFixed(0);
      },
      time: (d) => d.toLocaleTimeString("zh-CN", { hour12: false })
    };

    function isTradingWindow(now = new Date()) {
      const day = now.getDay();
      const minutes = now.getHours() * 60 + now.getMinutes();
      const morning = minutes >= 9 * 60 + 30 && minutes <= 11 * 60 + 30;
      const afternoon = minutes >= 13 * 60 && minutes <= 15 * 60;
      return day >= 1 && day <= 5 && (morning || afternoon);
    }

    function fetchJsonp(url, globalName, timeout = 4500) {
      return new Promise((resolve, reject) => {
        const callbackName = `jsonp_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const sep = url.includes("?") ? "&" : "?";
        const script = document.createElement("script");
        const done = (fn, value) => {
          clearTimeout(timer);
          script.remove();
          try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
          fn(value);
        };
        window[callbackName] = (payload) => done(resolve, payload);
        script.onerror = () => done(reject, new Error("行情源连接失败"));
        script.src = `${url}${sep}${globalName}=${callbackName}`;
        const timer = setTimeout(() => done(reject, new Error("行情源超时")), timeout);
        document.head.appendChild(script);
      });
    }

    function fetchSina() {
      return new Promise((resolve, reject) => {
        const stamp = Date.now();
        const script = document.createElement("script");
        const stock = state.currentStock;
        const varName = `hq_str_${stock.symbol}`;
        script.charset = "gbk";
        script.src = `https://hq.sinajs.cn/list=${stock.symbol}&_=${stamp}`;
        const timer = setTimeout(() => {
          if (script.parentNode) {
            script.remove();
            reject(new Error("新浪行情超时"));
          }
        }, 4500);
        script.onload = () => {
          clearTimeout(timer);
          const raw = window[varName] || "";
          script.remove();
          if (!raw) return reject(new Error("新浪行情为空"));
          resolve(parseSina(raw));
        };
        script.onerror = () => {
          clearTimeout(timer);
          script.remove();
          reject(new Error("新浪行情连接失败"));
        };
        document.head.appendChild(script);
      });
    }

    function parseSina(raw) {
      const parts = raw.split(",");
      const name = parts[0] || state.currentStock.name;
      const open = Number(parts[1]);
      const prevClose = Number(parts[2]);
      const price = Number(parts[3]);
      const high = Number(parts[4]);
      const low = Number(parts[5]);
      const volumeShares = Number(parts[8]);
      const turnover = Number(parts[9]);
      const dateText = parts[30] || "";
      const timeText = parts[31] || "";
      const at = parseDate(`${dateText} ${timeText}`);
      return normalizeQuote({
        source: "新浪",
        name,
        price,
        open,
        prevClose,
        high,
        low,
        volume: volumeShares,
        turnover,
        at
      });
    }

    async function fetchTencent() {
      const stamp = Date.now();
      const stock = state.currentStock;
      await loadScript(`https://qt.gtimg.cn/q=${stock.symbol}&_=${stamp}`);
      const raw = window[`v_${stock.symbol}`] || "";
      if (!raw) throw new Error("腾讯行情为空");
      return parseTencent(raw);
    }

    function parseTencent(raw) {
      const parts = raw.split("~");
      return normalizeQuote({
        source: "腾讯",
        name: parts[1] || state.currentStock.name,
        price: Number(parts[3]),
        prevClose: Number(parts[4]),
        open: Number(parts[5]),
        volume: Number(parts[6]) * 100,
        turnover: Number(parts[37]) * 10000,
        high: Number(parts[33]),
        low: Number(parts[34]),
        at: parseCompactTime(parts[30])
      });
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timer = setTimeout(() => {
          if (script.parentNode) {
            script.remove();
            reject(new Error("脚本行情源超时"));
          }
        }, 4500);
        script.src = src;
        script.onload = () => {
          clearTimeout(timer);
          script.remove();
          resolve();
        };
        script.onerror = () => {
          clearTimeout(timer);
          script.remove();
          reject(new Error("脚本行情源失败"));
        };
        document.head.appendChild(script);
      });
    }

    function parseDate(text) {
      const parsed = new Date(text.replace(/-/g, "/"));
      return Number.isNaN(parsed.getTime()) ? new Date() : parsed;
    }

    function parseCompactTime(text) {
      if (!text || text.length < 14) return new Date();
      const y = text.slice(0, 4);
      const m = text.slice(4, 6);
      const d = text.slice(6, 8);
      const h = text.slice(8, 10);
      const min = text.slice(10, 12);
      const s = text.slice(12, 14);
      return parseDate(`${y}/${m}/${d} ${h}:${min}:${s}`);
    }

    function normalizeQuote(q) {
      const change = q.price - q.prevClose;
      const changePct = q.prevClose ? change / q.prevClose * 100 : 0;
      return { ...q, change, changePct };
    }

    async function refresh() {
      const requestId = ++state.requestId;
      const requestStock = state.currentStock;
      try {
        let quote;
        try {
          quote = await fetchSina();
        } catch (e) {
          quote = await fetchTencent();
        }
        if (requestId !== state.requestId || requestStock.code !== state.currentStock.code) return;
        state.errors = 0;
        state.source = quote.source;
        addTick(quote);
        render();
      } catch (error) {
        if (requestId !== state.requestId || requestStock.code !== state.currentStock.code) return;
        state.errors += 1;
        setConnection("行情连接失败", false);
        addLog(`行情读取失败：${error.message}`);
        renderChart();
      }
    }

    function addTick(quote) {
      const now = new Date();
      const last = state.ticks[state.ticks.length - 1];
      const volumeDelta = last && Number.isFinite(quote.volume)
        ? Math.max(0, quote.volume - last.volume)
        : 0;
      const tick = { ...quote, seenAt: now, volumeDelta };
      state.quote = quote;
      state.lastFetchAt = now;
      const isDuplicate = last && Math.abs(last.price - quote.price) < 0.0001 && last.volume === quote.volume && fmt.time(last.at) === fmt.time(quote.at);
      if (!isDuplicate || state.ticks.length === 0) {
        state.ticks.push(tick);
        if (state.ticks.length > MAX_POINTS) state.ticks.shift();
        addLog(`${state.currentStock.name} ${fmt.price(quote.price)} · ${fmt.pct(quote.changePct)} · ${quote.source}`);
      }
    }

      row.className = "log-row";
      row.innerHTML = `<span>${fmt.time(new Date())}</span><span>${text}</span>`;
      els.log.prepend(row);

    function render() {

    function dynamicAverage(points) {
      const weighted = points.reduce((sum, p) => sum + p.price * Math.max(1, p.volumeDelta), 0);
      const vol = points.reduce((sum, p) => sum + Math.max(1, p.volumeDelta), 0);
      return vol ? weighted / vol : points.reduce((sum, p) => sum + p.price, 0) / Math.max(1, points.length);
    }

    function movingAverage(points, size) {
      const slice = points.slice(-size);
      return slice.reduce((sum, p) => sum + p.price, 0) / Math.max(1, slice.length);
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function scoreRange(value, low, high) {
      if (!Number.isFinite(value)) return 0;
      return clamp((value - low) / Math.max(0.0001, high - low) * 100, 0, 100);
    }

    function ema(values, period) {
      if (!values.length) return NaN;
      const k = 2 / (period + 1);
      return values.reduce((prev, value, index) => index ? value * k + prev * (1 - k) : value, values[0]);
    }

    function emaSeries(values, period) {
      const k = 2 / (period + 1);
      const out = [];
      values.forEach((value, index) => {
        out.push(index ? value * k + out[index - 1] * (1 - k) : value);
      });
      return out;
    }

    function standardDeviation(values) {
      if (!values.length) return 0;
      const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
      const variance = values.reduce((sum, value) => sum + Math.pow(value - mean, 2), 0) / values.length;
      return Math.sqrt(variance);
    }

    function calcRsi(points, period = 14) {
      if (points.length < 3) return 50;
      const slice = points.slice(-(period + 1));
      let gains = 0;
      let losses = 0;
      for (let i = 1; i < slice.length; i++) {
        const diff = slice[i].price - slice[i - 1].price;
        if (diff >= 0) gains += diff;
        else losses -= diff;
      }
      if (losses === 0) return gains === 0 ? 50 : 100;
      const rs = gains / losses;
      return 100 - 100 / (1 + rs);
    }

    function calcMacd(points) {
      const prices = points.map(p => p.price);
      const fastSeries = emaSeries(prices, 12);
      const slowSeries = emaSeries(prices, 26);
      const difSeries = prices.map((_, index) => fastSeries[index] - slowSeries[index]);
      const deaSeries = emaSeries(difSeries, 9);
      const dif = difSeries[difSeries.length - 1] || 0;
      const dea = deaSeries[deaSeries.length - 1] || 0;
      const hist = (dif - dea) * 2;
      const prevHist = difSeries.length > 1
        ? ((difSeries[difSeries.length - 2] || 0) - (deaSeries[deaSeries.length - 2] || 0)) * 2
        : hist;
      return { dif, dea, hist, prevHist };
    }

    function calcIndicators(points, q) {
      const prices = points.map(p => p.price);
      const latest = points[points.length - 1] || q;
      const avg = dynamicAverage(points);
      const maFast = movingAverage(points, 5);
      const maMid = movingAverage(points, 13);
      const maSlow = movingAverage(points, 34);
      const emaFast = ema(prices, 8);
      const emaSlow = ema(prices, 21);
      const macd = calcMacd(points);
      const rsi = calcRsi(points, 14);
      const bbSlice = prices.slice(-20);
      const bbMid = bbSlice.reduce((sum, value) => sum + value, 0) / Math.max(1, bbSlice.length);
      const bbStd = standardDeviation(bbSlice);
      const bbUpper = bbMid + bbStd * 2;
      const bbLower = bbMid - bbStd * 2;
      const bbPos = (q.price - bbLower) / Math.max(0.0001, bbUpper - bbLower) * 100;
      const recent = points.slice(-20);
      const prevRecent = recent.slice(0, -1);
      const avgVol = prevRecent.reduce((sum, item) => sum + item.volumeDelta, 0) / Math.max(1, prevRecent.length);
      const latestVol = latest.volumeDelta || 0;
      const volumePulse = latestVol / Math.max(1, avgVol);
      const highSinceOpen = Math.max(q.high || q.price, ...prices);
      const lowSinceOpen = Math.min(q.low || q.price, ...prices);
      const priorHigh = points.length > 1 ? Math.max(...points.slice(0, -1).map(p => p.price), q.open || q.price) : q.open || q.price;
      const drawdown = highSinceOpen ? (highSinceOpen - q.price) / highSinceOpen * 100 : 0;
      const intradayRange = q.prevClose ? (q.high - q.low) / q.prevClose * 100 : 0;
      const avgBias = avg ? (q.price / avg - 1) * 100 : 0;
      const trendSlope = maMid ? (maFast / maMid - 1) * 100 : 0;
      const openStrength = q.open ? (q.price / q.open - 1) * 100 : 0;
      const pullbackToAvg = Math.abs(avgBias);
      const volumeDryUp = avgVol > 0 ? 1 / Math.max(0.2, volumePulse) : 0;
      const maAlignment = maFast >= maMid && maMid >= maSlow;
      const breakoutPct = priorHigh ? (q.price / priorHigh - 1) * 100 : 0;
      return {
        avg,
        maFast,
        maMid,
        maSlow,
        emaFast,
        emaSlow,
        macd,
        rsi,
        bbPos,
        volumePulse,
        drawdown,
        intradayRange,
        avgBias,
        trendSlope,
        openStrength,
        pullbackToAvg,
        volumeDryUp,
        maAlignment,
        breakoutPct,
        priorHigh,
        highSinceOpen,
        lowSinceOpen
      };
    }

    function factorMark(score) {
      if (score >= 70) return "ok";
      if (score >= 45) return "warn";
      return "bad";
    }

    const strategyProfiles = {
      balanced: {
        label: "综合多因子",
        note: "综合趋势、动量、量能、价格位置与风险过滤。",
        weights: { trend: 0.24, momentum: 0.20, volume: 0.18, position: 0.18, risk: 0.20 },
        trigger: 82,
        near: 66
      },
      strictTrend: {
        label: "AI 严进趋势",
        note: "借鉴 AI 分析工具的严进严出思路，优先要求趋势、动量、风控同时过关。",
        weights: { trend: 0.30, momentum: 0.24, volume: 0.14, position: 0.12, risk: 0.20 },
        trigger: 86,
        near: 72
      },
      volumeBreakout: {
        label: "放量突破",
        note: "适合观察突破日内高位或动态均价后的资金确认。",
        weights: { trend: 0.20, momentum: 0.18, volume: 0.30, position: 0.18, risk: 0.14 },
        trigger: 82,
        near: 68
      },
      pullback: {
        label: "缩量回踩",
        note: "适合观察趋势未破、靠近均价且成交萎缩后的低吸条件。",
        weights: { trend: 0.24, momentum: 0.12, volume: 0.16, position: 0.28, risk: 0.20 },
        trigger: 78,
        near: 64
      },
      maAlignment: {
        label: "多头排列",
        note: "适合观察短中长期均线顺序和趋势延续。",
        weights: { trend: 0.36, momentum: 0.18, volume: 0.12, position: 0.14, risk: 0.20 },
        trigger: 84,
        near: 68
      }
    };

    function strategyBonus(mode, ind, q, p) {
      if (mode === "strictTrend") {
        const ok = ind.maAlignment && q.price >= ind.maFast && ind.rsi >= 50 && ind.rsi <= p.rsiMax && q.changePct >= p.minRise;
        return {
          bonus: ok ? 8 : -6,
          label: ok ? "严进条件满足" : "严进条件未齐",
          detail: `多头 ${ind.maAlignment ? "是" : "否"} · RSI ${ind.rsi.toFixed(0)} · 涨幅 ${fmt.pct(q.changePct)}`
        };
      }
      if (mode === "volumeBreakout") {
        const breakout = ind.breakoutPct >= p.breakout || ind.avgBias >= p.breakout;
        const volume = ind.volumePulse >= p.volume;
        return {
          bonus: breakout && volume ? 10 : breakout || volume ? 2 : -8,
          label: breakout && volume ? "放量突破确认" : "突破/量能待确认",
          detail: `突破 ${fmt.pct(ind.breakoutPct)} · 量能 ${ind.volumePulse.toFixed(1)}x`
        };
      }
      if (mode === "pullback") {
        const nearAvg = ind.pullbackToAvg <= Math.max(0.45, p.breakout + 0.25);
        const trendHold = q.price >= ind.maMid && ind.emaFast >= ind.emaSlow;
        const dry = ind.volumePulse > 0 && ind.volumePulse <= Math.max(1.15, p.volume - 0.25);
        return {
          bonus: nearAvg && trendHold && dry ? 9 : nearAvg && trendHold ? 2 : -5,
          label: nearAvg && trendHold && dry ? "缩量回踩成立" : "回踩条件观察",
          detail: `均价距离 ${fmt.pct(ind.pullbackToAvg)} · 量能 ${ind.volumePulse.toFixed(1)}x`
        };
      }
      if (mode === "maAlignment") {
        return {
          bonus: ind.maAlignment ? 8 : -4,
          label: ind.maAlignment ? "多头排列成立" : "均线排列未完成",
          detail: `MA5 ${fmt.price(ind.maFast)} / MA13 ${fmt.price(ind.maMid)} / MA34 ${fmt.price(ind.maSlow)}`
        };
      }
      return {
        bonus: 0,
        label: "综合模型",
        detail: strategyProfiles.balanced.note
      };
    }

    function renderSignal() {
      const q = state.quote;
      const points = state.ticks;
      const p = readParams();
      const ind = calcIndicators(points, q);
      const profile = strategyProfiles[p.strategyMode] || strategyProfiles.balanced;
      const bonus = strategyBonus(p.strategyMode, ind, q, p);
      const minDataScore = scoreRange(points.length, 4, 28);
      const factors = [
        {
          name: "趋势确认",
          detail: `MA5 ${fmt.price(ind.maFast)} / MA13 ${fmt.price(ind.maMid)} / EMA8-21 ${fmt.pct((ind.emaFast / ind.emaSlow - 1) * 100)}`,
          score: Math.round((scoreRange(ind.trendSlope, -0.15, 0.55) * 0.45) + (scoreRange((ind.emaFast / ind.emaSlow - 1) * 100, -0.15, 0.45) * 0.35) + (q.price >= ind.maFast ? 20 : 0)),
          weight: profile.weights.trend
        },
        {
          name: "动量确认",
          detail: `MACD柱 ${ind.macd.hist.toFixed(3)} · RSI ${ind.rsi.toFixed(0)} · 较开盘 ${fmt.pct(ind.openStrength)}`,
          score: Math.round((scoreRange(ind.macd.hist - ind.macd.prevHist, -0.02, 0.06) * 0.35) + (scoreRange(ind.openStrength, -0.6, 1.8) * 0.35) + ((ind.rsi >= 45 && ind.rsi <= p.rsiMax) ? 30 : ind.rsi > p.rsiMax ? 8 : 14)),
          weight: profile.weights.momentum
        },
        {
          name: "成交量确认",
          detail: `最新量能 ${ind.volumePulse.toFixed(1)}x · 阈值 ${p.volume.toFixed(1)}x`,
          score: Math.round(scoreRange(ind.volumePulse, 0.75, Math.max(p.volume, 1.1) + 1.4)),
          weight: profile.weights.volume
        },
        {
          name: "价格位置",
          detail: `均价偏离 ${fmt.pct(ind.avgBias)} · 布林位置 ${ind.bbPos.toFixed(0)}%`,
          score: Math.round((scoreRange(ind.avgBias, p.breakout - 0.35, p.breakout + 1.2) * 0.55) + ((ind.bbPos >= 35 && ind.bbPos <= 88) ? 45 : ind.bbPos > 88 ? 18 : 25)),
          weight: profile.weights.position
        },
        {
          name: "风险过滤",
          detail: `涨幅 ${fmt.pct(q.changePct)} · 回撤 ${fmt.pct(ind.drawdown)} · 振幅 ${fmt.pct(ind.intradayRange)}`,
          score: Math.round((q.changePct >= p.minRise ? 24 : 6) + (q.changePct <= p.chase ? 26 : 4) + (ind.drawdown <= p.drawdown ? 26 : 8) + (ind.intradayRange > 0 && ind.intradayRange <= 8 ? 24 : 8)),
          weight: profile.weights.risk
        },
        {
          name: profile.label,
          detail: `${bonus.label} · ${bonus.detail}`,
          score: clamp(55 + bonus.bonus * 5, 0, 100),
          weight: 0
        }
      ].map(factor => ({ ...factor, score: clamp(factor.score, 0, 100) }));
      const rawScore = factors.reduce((sum, factor) => sum + factor.score * factor.weight, 0) + bonus.bonus;
      const riskBlock = q.changePct > p.chase || ind.drawdown > p.drawdown || ind.rsi > p.rsiMax + 8 || ind.intradayRange > 9.5;
      const score = Math.round(clamp(rawScore * (0.7 + minDataScore * 0.003), 0, riskBlock ? 72 : 100));
      const word = riskBlock ? "风控观望" : score >= profile.trigger ? "触发买点" : score >= profile.near ? "接近买点" : score >= 48 ? "弱信号" : "观望";
      const cls = score >= 82 ? "up" : score >= 62 ? "neutral" : "";
      els.signalWord.textContent = word;
      els.signalWord.className = `signal-word ${cls}`;
      els.signalReason.textContent = riskBlock
        ? "风险闸门触发，等待回撤、过热或振幅降温。"
        : score >= profile.trigger
          ? `${profile.label} 条件满足，可作为人工复核信号。`
          : score >= profile.near
            ? `${profile.label} 接近触发，重点等关键条件继续确认。`
            : score >= 48
              ? `${profile.label} 已有局部条件，但一致性还不够。`
              : `${profile.label}：${profile.note}`;
      els.signalTime.textContent = state.lastFetchAt ? fmt.time(state.lastFetchAt) : "--";
      els.score.textContent = String(score);
      els.score.style.setProperty("--score", score);
      els.checks.innerHTML = factors.map(factor => `
        <div class="check">
          <span class="mark ${factorMark(factor.score)}">${factor.score >= 70 ? "✓" : factor.score >= 45 ? "~" : "!"}</span>
          <span><strong>${factor.name}</strong><em>${factor.detail}</em></span>
          <span class="check-score">${factor.weight ? factor.score : bonus.bonus >= 0 ? `+${bonus.bonus}` : bonus.bonus}</span>
        </div>
      `).join("");
    }

    function readParams() {
      return {
        strategyMode: params.strategyMode.value,
        breakout: Number(params.breakout.value),
        minRise: Number(params.minRise.value),
        volume: Number(params.volume.value),
        rsiMax: Number(params.rsiMax.value),
        drawdown: Number(params.drawdown.value),
        chase: Number(params.chase.value)
      };
    }

    function updateParamLabels() {
      $("pBreakoutVal").textContent = `${Number(params.breakout.value).toFixed(2)}%`;
      $("pMinRiseVal").textContent = `${Number(params.minRise.value).toFixed(1)}%`;
      $("pVolumeVal").textContent = `${Number(params.volume.value).toFixed(1)}x`;
      $("pRsiMaxVal").textContent = `${Number(params.rsiMax.value).toFixed(0)}`;
      $("pDrawdownVal").textContent = `${Number(params.drawdown.value).toFixed(1)}%`;
      $("pChaseVal").textContent = `${Number(params.chase.value).toFixed(1).replace(".0", "")}%`;
    }

    function renderChart() {
      const canvas = $("chart");
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(600, Math.floor(rect.width * dpr));
      canvas.height = Math.max(320, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);
      drawGrid(ctx, w, h);
      const points = state.ticks;
      if (points.length < 1) {
        ctx.fillStyle = "rgba(255,255,255,.45)";
        ctx.font = "16px Microsoft YaHei, sans-serif";
        ctx.fillText("等待实时分时数据...", 24, 42);
        return;
      }
      const prices = points.map(p => p.price).filter(Number.isFinite);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const pad = Math.max((max - min) * 0.18, 0.02);
      const yMin = min - pad;
      const yMax = max + pad;
      const x = (i) => 44 + i * ((w - 78) / Math.max(1, points.length - 1));
      const y = (price) => 24 + (yMax - price) / Math.max(0.001, yMax - yMin) * (h - 64);
      if (points.length < 2) {
        ctx.fillStyle = "#67a7ff";
        ctx.beginPath();
        ctx.arc(w / 2, y(points[0].price), 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,.45)";
        ctx.font = "14px Microsoft YaHei, sans-serif";
        ctx.fillText("已取得最新行情，交易时段连续刷新后形成曲线。", 24, 42);
        drawAxisLabels(ctx, w, h, yMin, yMax, points);
        return;
      }
      drawLine(ctx, points.map((p, i) => [x(i), y(p.price)]), "#67a7ff", 2.4);
      const avgs = points.map((_, i) => dynamicAverage(points.slice(0, i + 1)));
      drawLine(ctx, avgs.map((v, i) => [x(i), y(v)]), "#f3c969", 1.6);
      const emaTrend = emaSeries(points.map(p => p.price), 13);
      drawLine(ctx, emaTrend.map((v, i) => [x(i), y(v)]), "#35c888", 1.4);
      drawAxisLabels(ctx, w, h, yMin, yMax, points);
    }

    function drawGrid(ctx, w, h) {
      ctx.strokeStyle = "rgba(255,255,255,.07)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = 24 + i * ((h - 64) / 4);
        ctx.beginPath();
        ctx.moveTo(44, y);
        ctx.lineTo(w - 24, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = 44 + i * ((w - 78) / 5);
        ctx.beginPath();
        ctx.moveTo(x, 24);
        ctx.lineTo(x, h - 40);
        ctx.stroke();
      }
    }

    function drawLine(ctx, pts, color, width) {
      if (!pts.length) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      pts.forEach(([x, y], index) => index ? ctx.lineTo(x, y) : ctx.moveTo(x, y));
      ctx.stroke();
    }

    function drawAxisLabels(ctx, w, h, yMin, yMax, points) {
      ctx.fillStyle = "rgba(255,255,255,.52)";
      ctx.font = "12px Microsoft YaHei, sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(yMax.toFixed(2), 8, 30);
      ctx.fillText(((yMin + yMax) / 2).toFixed(2), 8, h / 2);
      ctx.fillText(yMin.toFixed(2), 8, h - 42);
      ctx.textAlign = "center";
      ctx.fillText(fmt.time(points[0].at), 60, h - 16);
      ctx.fillText(fmt.time(points[points.length - 1].at), w - 74, h - 16);
    }

    Object.values(params).forEach(input => {
      input.addEventListener("input", () => {
        updateParamLabels();
        if (state.quote) renderSignal();
      });
      input.addEventListener("change", () => {
        updateParamLabels();
        if (state.quote) renderSignal();
      });
    });
    $("refreshBtn").addEventListener("click", refresh);
    els.stockSelect.addEventListener("change", (event) => switchStock(event.target.value));
    window.addEventListener("resize", renderChart);

    updateParamLabels();
    updateStockHeader();
    addLog("看板已启动，正在连接行情源。");
    refresh();
    state.fetchTimer = setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
